general {
    # Hides the weird loading bar that shows up at the bottom when it boots
    disable_loading_bar = true
    
    # Hides your mouse pointer so it doesn't ruin the aesthetic
    hide_cursor = true
    
    # The time (in seconds) you have to move the mouse to unlock without a password. 0 means instantly locked.
    grace = 0
    
    # Set to true to make the lock screen snap on instantly. False makes it fade in smoothly.
    no_fade_in = false
    
    # Set to true to make it snap off when you unlock. False makes it fade out smoothly.
    no_fade_out = false
}

# THE BACKGROUND (Smooth, high-quality frosted glass, zero pixelation)
background {
    # Leaving this blank applies this background to ALL monitors
    monitor =
    
    # Takes a live picture of your desktop right as you lock it
    path = screenshot
    
    # How many times it runs the blur filter. 3 is smooth glass. 1 is blocky trash.
    blur_passes = 3
    
    # The radius of the blur. Higher number = blurrier/less recognizable background.
    blur_size = 2
    
    # Adds TV static/grain. Set to 0.0 for pure, clean glass.
    noise = 0.0 
    
    # 1.0 is normal contrast. 0.9 flattens it slightly so the white circle pops more.
    contrast = 0.9
    
    # 1.0 is normal brightness. 0.6 darkens the background so the white text/glow is readable.
    brightness = 0.6
}

# THE CIRCLE 
input-field {
    # Leaving this blank puts the circle on ALL monitors
    monitor =
    
    # The width and height of the typing area. .
    size = 90, 90
    
    # The thickness of the glowing ring border.
    outline_thickness = 2
    
    # -1 is the magic number. It forces a square to become a perfect circle.
    rounding = -1
    
    # Default font for anything typed inside the circle
    font_family = Iosevka
    
    # The color of the text you actually type. (255, 255, 255 is pure white)
    font_color = rgb(255, 255, 255)
    
    # False means the placeholder text stays visible. True means it vanishes when you stop typing.
    fade_on_empty = false
    
    # What it shows before you type. Using the UTF-8 geometric target symbol.
    placeholder_text = <span font_family="Iosevka"></span>
    
    # What it shows when you fuck up the password. 
    fail_text = <span font_family="Iosevka">Auth Failed</span>
    
    # --- Colors ---
    # The color of the border ring. (255,255,255, 1.0) is pure, solid white.
    outer_color = rgba(255, 255, 255, 1.0)
    
    # The inside of the circle. (0,0,0, 0.4) is black with 40% transparency so you can read the text.
    inner_color = rgba(0, 0, 0, 0.4) 
    
    # The ring color while it's verifying your password/fingerprint. Kept white to match the aesthetic.
    check_color = rgb(255, 255, 255)
    
    # The ring color when you get the password wrong. (Pure red).
    fail_color = rgb(255, 0, 0)
    
    # --- Typing dots ---
    # How big the password masking dots are (relative to the circle size)
    dots_size = 0.1
    
    # How far apart the password dots are from each other
    dots_spacing = 0.2
    
    # Keeps the dots perfectly centered in the middle of the circle
    dots_center = true
    
    # --- Positioning ---
    # X and Y offsets. 0, 0 means dead center of the screen.
    position = 0, 0
    
    # Horizontal alignment
    halign = center
    
    # Vertical alignment
    valign = center

    # No need
    # # How many times the shadow is rendered. More passes = smoother, wider bloom.
    # shadow_passes = 3
    
    # # How far the glow spreads outside the circle.
    # shadow_size = 18
    
    # # The color of the glow. White with 60% transparency (0.6) so it looks like emitted light.
    # shadow_color = rgba(255, 255, 255, 0.6)
}