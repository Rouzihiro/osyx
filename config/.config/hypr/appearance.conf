# =============================================================================
# appearance.conf — layout, decoration, animations
# Everything visual. Theme colors are injected via theme.conf (see flavors/).
# =============================================================================

########## monitors ##########
# Catch-all rule: preferred resolution, auto position, scale 1.
# Override in _monitors.conf if you have a multi-monitor setup.
monitor = ,preferred,auto,1

########## theme ##########
# Generated by flavors/generate.py. Exposes $active_border, $inactive_border, etc.
source = ~/.config/hypr/theme.conf

########## general ##########
general {
  gaps_in          = 6
  gaps_out         = 18
  border_size      = 2
  col.inactive_border = $inactive_border
  col.active_border   = $active_border
  resize_on_border = true
  layout           = dwindle
  allow_tearing    = false
}

########## decoration ##########
decoration {
  rounding         = 12
  active_opacity   = 1.0
  inactive_opacity = 0.90

  blur {
    enabled = true
    size    = 6
    passes  = 2
  }
}

########## animations ##########
animations {
  enabled = yes

  bezier    = ease, 0.2, 0.9, 0.2, 1.0
  animation = windows,    1, 5,  ease, slide
  animation = border,     1, 10, ease
  animation = fade,       1, 5,  ease
  animation = workspaces, 1, 5,  ease, slide
}

########## dwindle ##########
dwindle {
  pseudotile     = true
  preserve_split = true
}
