# ── Workspace 1: notes (Obsidian) ────────────────────────────────────────────
exec-once = [workspace 1 silent] obsidian

# ── Workspace 2: browser (Chrome, default profile) ───────────────────────────
exec-once = [workspace 2 silent] google-chrome --profile-directory="Default"

# ── Workspace 3: terminals ────────────────────────────────────────────────────
exec-once = [workspace 3 silent] kitty
exec-once = [workspace 3 silent] kitty
exec-once = [workspace 3 silent] kitty

# ── Workspace 8: secondary Chrome profile (delayed to avoid race) ─────────────
exec-once = bash -c 'sleep 2 && hyprctl dispatch exec "[workspace 8 silent] google-chrome --profile-directory=\"Profile 2\""'

# ── Workspace 9: YouTube in Brave ─────────────────────────────────────────────
exec-once = [workspace 9 silent] brave-browser --profile-directory="Default" --app="https://youtube.com"

exec-once = mkdir -p $screenshot_dir

exec-once = hyprpaper
exec-once = mako
exec-once = swww-daemon
exec-once = waypaper --backend swww --restore
exec-once = pavucontrol --hide-window --start-hidden
exec-once = blueman-applet
