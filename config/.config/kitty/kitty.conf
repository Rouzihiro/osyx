# ╔══════════════════════════════════════════════════════════════════╗
# ║                        kitty.conf                               ║
# ╚══════════════════════════════════════════════════════════════════╝

# Allow kitty to be controlled remotely via `kitty @` CLI commands.
# Required for scripting, remote tab/window management, etc.
allow_remote_control yes


# ════════════════════════════════════════════════════════════════════
#  FONT
# ════════════════════════════════════════════════════════════════════

# Primary font family. Must be installed on your system.
font_family          Iosevka Fixed SS18
font_size            18

# Let kitty auto-detect bold/italic variants from the font family.
bold_font            auto
italic_font          auto
bold_italic_font     auto


# ════════════════════════════════════════════════════════════════════
#  FONT METRICS
# ════════════════════════════════════════════════════════════════════

# Fine-tune vertical line height (in pixels, can be negative).
adjust_line_height   0

# Fine-tune horizontal cell width (in pixels, can be negative).
adjust_column_width  0


# ════════════════════════════════════════════════════════════════════
#  CURSOR
# ════════════════════════════════════════════════════════════════════

# Cursor shape: block | beam | underline.
# underline sits at the bottom of the cell — never touches Starship above,
# less visually aggressive than block, still very readable.
cursor_shape                 underline

# Thickness of the underline cursor in pts. 2 is chunky enough to see clearly.
cursor_underline_thickness   2

# Blink interval in seconds. ease-in-out makes it gently fade in and out
# (pulse effect) rather than a hard on/off flash. Set to 0 to disable.
cursor_blink_interval        0.5 ease-in-out

# Keep blinking indefinitely (never stop after idle).
cursor_stop_blinking_after 0

# Prevent the shell (or shell integration) from overriding the cursor shape.
shell_integration        no-cursor

# When the window loses focus, hide the cursor completely.
# kitty has no native "hidden" unfocused state, so this is handled by
# the watcher script below which fires on every focus change event.
# hollow is the fallback in case the watcher isn't loaded yet.
cursor_shape_unfocused   hollow

# Watcher script: hides cursor on unfocus, restores it on focus.
# Make sure hide_cursor_on_unfocus.py lives in ~/.config/kitty/
watcher                  ~/.config/kitty/hide_cursor_on_unfocus.py

# Enable cursor trail — leaves a fading ghost behind the cursor as it moves.
# Set to 0 to disable.
cursor_trail             1

# Trail decay times in seconds (fastest, slowest).
# Lower = snappier fade, higher = longer lingering trail.
cursor_trail_decay       0.1 0.3


# ════════════════════════════════════════════════════════════════════
#  BACKGROUND + TRANSPARENCY
# ════════════════════════════════════════════════════════════════════

# Background opacity (0.0 = fully transparent, 1.0 = fully opaque).
# Requires a compositor running (e.g. picom on X11, or Wayland compositors).
background_opacity       0.41


# ════════════════════════════════════════════════════════════════════
#  TERMINAL BEHAVIOR
# ════════════════════════════════════════════════════════════════════

# Number of lines kept in the scrollback buffer. Stored in RAM on demand.
scrollback_lines         10000

# Disable the terminal bell sound entirely.
enable_audio_bell        no

# Sync rendering to the monitor refresh rate to eliminate tearing.
sync_to_monitor          yes

# Hide the mouse cursor after N seconds of inactivity (0 = never hide).
mouse_hide_wait          3.0

# Default shell to launch in new windows/tabs.
shell                    zsh

# Disable the confirmation prompt when closing a window
confirm_os_window_close 0

# ════════════════════════════════════════════════════════════════════
#  WINDOW
# ════════════════════════════════════════════════════════════════════

# Inner padding in pixels: top/bottom  left/right.
# Extra left padding (14px) keeps text off the edge nicely.
window_padding_width     5 5 5 14

# Keep OS window decorations (title bar + borders).
# Set to yes to go fully borderless.
hide_window_decorations  no

# Resize the window in whole cell increments rather than pixels.
resize_in_steps          no


# ════════════════════════════════════════════════════════════════════
#  PERFORMANCE
# ════════════════════════════════════════════════════════════════════

# Delay (in ms) between screen repaints. Lower = smoother, more CPU.
repaint_delay            10

# Delay (in ms) before processing keyboard input. Reduces flicker on slow CPUs.
input_delay              1


# ════════════════════════════════════════════════════════════════════
#  CLIPBOARD + MOUSE
# ════════════════════════════════════════════════════════════════════

# Automatically copy any text selection to the clipboard.
copy_on_select           yes

# Strip trailing whitespace from lines when copying.
strip_trailing_spaces    always

# Which clipboard operations are permitted.
clipboard_control        write-clipboard write-primary read-clipboard read-primary

# Allow pasting with the middle mouse button.
paste_with_middle_button yes


# ════════════════════════════════════════════════════════════════════
#  KEYBINDINGS
# ════════════════════════════════════════════════════════════════════

# Standard clipboard shortcuts.
map ctrl+shift+c    copy_to_clipboard
map ctrl+shift+v    paste_from_clipboard

# Legacy X11-style clipboard shortcuts.
map ctrl+insert     copy_to_clipboard
map shift+insert    paste_from_clipboard


# ════════════════════════════════════════════════════════════════════
#  THEME
# ════════════════════════════════════════════════════════════════════
# Universal Neutral - High Vibrancy

# ---------------------------------------------------------
# CORE WINDOW COLORS
# ---------------------------------------------------------
# The main background color of the terminal. With transparency on,
# this acts as the tint over a blurred wallpaper.
background            #0A0E14
# The default color for standard text typed in the prompt or printed out.
foreground            #ECEFF4

# Colors for when you click and drag to highlight/select text.
selection_background  #2A2F38
selection_foreground  #FFFFFF

# The block/underline cursor itself, and the color of the text sitting exactly underneath it.
cursor                #D8DEE9
cursor_text_color     #0A0E14

# The color of clickable hyperlinks when hovered over.
url_color             #8BE9FD

# Border colors for when you use Kitty's window splits (multiple panes in one window).
active_border_color   #5C6370
inactive_border_color #1D202F

# ---------------------------------------------------------
# TAB BAR COLORS
# ---------------------------------------------------------
# Background of the entire tab bar area.
tab_bar_background    #0A0E14
# The tab you are currently looking at (background and text).
active_tab_background #2A2F38
active_tab_foreground #FFFFFF
# The tabs that are in the background (background and text).
inactive_tab_background #0A0E14
inactive_tab_foreground #6B7280

# ---------------------------------------------------------
# TERMINAL ANSI COLORS (0-15)
# ---------------------------------------------------------
# --- Black / Gray ---
# color0: Often used by TUI apps for dark background elements or deep shadows.
color0   #1D202F
# color8: CRITICAL for zsh/fish autocomplete ghost text. Also used for inactive/disabled text.
color8   #6B7280

# --- Red ---
# color1: Standard error messages, deleted lines in `git diff`, failing test outputs.
color1   #FF657A
# color9: Brighter errors, urgent warnings, or bold syntax highlights.
color9   #FF8394

# --- Green ---
# color2: Success messages, added lines in `git diff`, executable files in `ls`.
color2   #50FA7B
# color10: Brighter success highlights, prominent "OK" statuses.
color10  #70FA94

# --- Yellow ---
# color3: Warnings, modified files in `git status`, block devices in `ls`.
color3   #F1FA8C
# color11: Highlighted warnings, active branch names in some prompts.
color11  #F4FAB1

# --- Blue ---
# color4: Folders/Directories when you type `ls`, informational messages.
color4   #61BFFF
# color12: Brighter informational text, highlighted variables in some syntax themes.
color12  #86D0FF

# --- Magenta / Purple ---
# color5: Image/Media files in `ls`, used heavily in code syntax for keywords/macros.
color5   #FF79C6
# color13: Brighter purple, often used for Regex or special constants in code.
color13  #FF96D5

# --- Cyan ---
# color6: Symlinks (shortcuts) in `ls`, string values in code syntax highlighting.
color6   #8BE9FD
# color14: Brighter cyan, emphasized strings, active selections in some terminal UI apps.
color14  #A3EFFD

# --- White / Light Gray ---
# color7: Default text fallback for many CLI apps if they don't use your global `foreground`.
color7   #E2E2E2
# color15: Pure bright white. Used for bolded text, emphasis, and high-contrast headers.
color15  #FFFFFF

