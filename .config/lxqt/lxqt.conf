[General]
__userfile__=true
theme=dark
icon_theme=Papirus-Dark
font=Inter,10
single_click_activate=false
tool_button_style=ToolButtonTextBesideIcon
enable_workspaces=true
ask_for_confirmation_on_logout=true
save_session=true

[Environment]
QT_QPA_PLATFORM=wayland;xcb
QT_STYLE_OVERRIDE=Fusion
QT_AUTO_SCREEN_SCALE_FACTOR=1
QT_SCALE_FACTOR=1
QT_FONT_DPI=96

[Session]
autoStart=true
leaveConfirmation=true
lockBeforeSleep=true

[PowerManagement]
enableBatteryWatcher=true
enableIdlenessWatcher=true
batteryLowLevel=15
batteryCriticalLevel=5
suspendOnCriticalBattery=true

[QuickLaunch]
enabled=true

[Notifications]
enabled=true

