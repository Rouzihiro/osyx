# ==============================
# ENV / SHELL
# ==============================
[env]
TERM = "xterm-256color"

[shell]
program = "/usr/bin/zsh"

# ==============================
# WINDOW / LAYOUT
# ==============================
[window]
decorations = "full"
opacity = 0.41
dynamic_padding = false
resize_increments = false

[window.padding]
x = 5
y = 5

# ==============================
# SCROLLBACK
# ==============================
[scrolling]
history = 10000
multiplier = 3

# ==============================
# CURSOR 
# ==============================
[cursor]
blink_interval = 600
blink_timeout = 5

[cursor.style]
shape = "Block"
blinking = "On"

# ==============================
# FONT
# ==============================
[font]
size = 18.0

[font.normal]
family = "Iosevka Fixed SS18"
style = "Regular"

[font.bold]
family = "Iosevka Fixed SS18"
style = "Bold"

[font.italic]
family = "Iosevka Fixed SS18"
style = "Italic"

[font.bold_italic]
family = "Iosevka Fixed SS18"
style = "Bold Italic"

# ==============================
# SELECTION / CLIPBOARD
# ==============================
[selection]
save_to_clipboard = true

# ==============================
# INPUT / UX
# ==============================
[bell]
animation = "None"
duration = 0

[mouse]
hide_when_typing = true

# ==============================
# KEYBINDINGS (kitty-aligned)
# ==============================

# toggle vi mode
[[keyboard.bindings]]
action = "ToggleViMode"
key = "Space"
mods = "Control|Shift"

# spawn new window
[[keyboard.bindings]]
action = "SpawnNewInstance"
key = "Return"
mods = "Control|Shift"

# scrollback with vim muscle memory
[[keyboard.bindings]]
action = "ScrollLineUp"
key = "K"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "ScrollLineDown"
key = "J"
mods = "Control|Shift"

# font scaling
[[keyboard.bindings]]
action = "IncreaseFontSize"
key = "Equals"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "DecreaseFontSize"
key = "Minus"
mods = "Control|Shift"

# fullscreen
[[keyboard.bindings]]
action = "ToggleFullscreen"
key = "M"
mods = "Control|Shift"

# ctrl+backspace -> ctrl+w (shell parity)
[[keyboard.bindings]]
chars = "\u0017"
key = "Back"
mods = "Control"

# ==============================
# COLORS (unchanged – your Tokyo Night)
# ==============================
[colors.primary]
background = "0x1a1b26"
foreground = "0xc0caf5"

[colors.normal]
