# tuned, vim-first, low-noise, readable
color_theme = "/usr/share/btop/themes/ayu.theme"

# let terminal handle transparency
theme_background = False
truecolor = True
force_tty = False

# layout presets (kept simple and predictable)
presets = "cpu:0:braille,mem:0:block,net:0:tty,proc:1:default"

# vim muscle memory
vim_keys = True

rounded_corners = True

# global default graph symbol
graph_symbol = "braille"
graph_symbol_cpu = "braille"
graph_symbol_mem = "block"
graph_symbol_net = "tty"
graph_symbol_proc = "default"

shown_boxes = "cpu mem net proc"

# slower, more accurate sampling
update_ms = 1000

# process list behavior
proc_sorting = "cpu lazy"
proc_reversed = False
proc_tree = False
proc_colors = True
proc_gradient = True
proc_per_core = False
proc_mem_bytes = True
proc_cpu_graphs = False
proc_info_smaps = False
proc_left = False
proc_filter_kernel = False

# cpu graphs
cpu_graph_upper = "total"
cpu_graph_lower = "total"
cpu_invert_lower = True
cpu_single_graph = False
cpu_bottom = False

show_uptime = True
check_temp = True
cpu_sensor = "Auto"
show_coretemp = True
cpu_core_map = ""
temp_scale = "celsius"
show_cpu_freq = True

# clock
clock_format = "%X"
background_update = True
custom_cpu_name = ""

# memory + disks (clean separation)
mem_graphs = True
mem_below_net = False
zfs_arc_cached = True

show_swap = True
swap_disk = False

show_disks = True
only_physical = True
use_fstab = False

disk_free_priv = False
show_io_stat = True
io_mode = False
io_graph_combined = False
io_graph_speeds = ""

# network
net_download = 100
net_upload = 100
net_auto = True
net_sync = True
net_iface = ""

# power
show_battery = True
selected_battery = "Auto"

# safety
content_search_max_file_size = 10MB
log_level = "WARNING"

