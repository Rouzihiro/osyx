; colors.ini (cap-machine)
[color]
; core
base      = #070c12
deep      = #06101a
surface1  = #141f2b
surface2  = #213042
text      = #d6dee6
muted     = #7d8894
accent    = #7fa6c9
spectral  = #a7a0c8

; semantic
red       = #e24d5c
green     = #5bd08d
yellow    = #e6b450
blue      = #7fa6c9
purple    = #a7a0c8
cyan      = #5ccfe6
orange    = #c87c3e
pink      = #ff7eb6

; polybar expects these names in some places
background = ${color.surface1}
foreground = ${color.text}
sep        = ${color.surface2}

; glass surface used everywhere (ARGB: 00 is transparent, FF opaque)
glass = #B3141F2B
glass2 = #A3213042

