<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>

  <!-- UI / general sans -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Inter</family>
      <family>Plus Jakarta Sans</family>
      <family>Satoshi</family>
      <family>Raleway</family>
    </prefer>
  </alias>

  <!-- Serif fallback -->
  <alias>
    <family>serif</family>
    <prefer>
      <family>Plus Jakarta Sans</family>
      <family>Raleway</family>
      <family>Inter</family>
    </prefer>
  </alias>

  <!-- Terminal / code -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>Iosevka Fixed SS18</family>
      <family>Meslo Nerd Font</family>
    </prefer>
  </alias>

</fontconfig>

