# neofetch config.conf
print_info() {
    prin ""
    info "$(color 6)ΎΝΔ  os     " distro
    info "$(color 6)ΎΤΚ  shell  " shell
    info "$(color 6)ΌηΧ  term   " term
    info "$(color 6)ΎΜΡ  wm     " wm
    info "$(color 6)≤░ξΦ  up     " uptime
    info "$(color 6)≤░ΠΩ  pkgs   " packages
    prin ""
    prin "$(color 1)ΎΕΣ $(color 2)ΎΕΣ $(color 3)ΎΕΣ $(color 4)ΎΕΣ $(color 5)ΎΕΣ $(color 6)ΎΕΣ $(color 7)ΎΕΣ"
}

title_fqdn="off"

# =============================
# core identity
# =============================
kernel_shorthand="on"
distro_shorthand="on"
os_arch="off"
uptime_shorthand="tiny"

# =============================
# system noise disabled
# =============================
cpu_display="off"
memory_display="off"
disk_display="off"
battery_display="off"

cpu_temp="off"
cpu_speed="off"
cpu_cores="off"

gpu_brand="on"
gpu_type="dedicated"

disk_show=()
disk_percent="off"

# =============================
# no background services
# =============================
music_player="none"
public_ip_timeout=0

# =============================
# desktop / gtk
# =============================
gtk2="off"
gtk3="off"
gtk_shorthand="on"
de_version="on"

# =============================
# text + layout
# =============================
bold="on"
underline_enabled="off"
separator="  "

# =============================
# colors
# =============================
colors=(distro)

color_blocks="on"
block_range=(0 7)
block_width=3
block_height=1
col_offset="auto"

# =============================
# ascii
# =============================
image_backend="ascii"
image_source="auto"
ascii_distro="auto"
ascii_colors=(distro)
ascii_bold="on"

# =============================
# bars (disabled by design)
# =============================
bar_border="off"
bar_length=0
bar_color_elapsed="distro"
bar_color_total="distro"

# =============================
# image junk fully off
# =============================
image_loop="off"
thumbnail_dir="${XDG_CACHE_HOME:-${HOME}/.cache}/thumbnails/neofetch"
crop_mode="normal"
crop_offset="center"
image_size="none"
gap=2
xoffset=0
yoffset=0

