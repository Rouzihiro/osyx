# =============================================================================
# rules.conf — window rules
# Generic rules. Add app-specific overrides in _keybinds.conf or a _rules.conf
# if you need rules that depend on personal apps.
# =============================================================================

# Slight transparency for terminals
windowrulev2 = opacity 0.97, class:^(Alacritty|kitty)$

# Suppress maximize requests from apps — let Hyprland handle tiling
windowrulev2 = suppressevent maximize, class:.*

# Forced opacity for focus-heavy apps — overrides both active and inactive
windowrulev2 = opacity 0.9 override 0.9 override, class:^(firefox|cursor|obsidian|code)$
