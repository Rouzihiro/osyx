# _keybinds.conf
# =============================================================================
# _keybinds.conf — personal app shortcuts
# Depends on personal binaries (asryx, kden, shot-mac, shot-full), local apps, and
# the $webapp variable from _variables.conf. None of this is portable as-is.
# =============================================================================

########## theme rotation ##########
bind = ALT, R, exec, zsh -ic 'themes rotate'

########## screenshots (set up via scripts/enable-mac-like-screenshots.zsh) ##########
# F9: Instant full screen capture
bind = , XF86Launch2, exec, ~/.local/bin/shot-full

# F10: Mac-style region select
bind = , Print, exec, ~/.local/bin/shot-mac
########## apps ##########
bind = ALT, O, exec, obsidian
bind = ALT, S, exec, spotify
bind = ALT, E, exec, code       # VSCode
bind = ALT, F, exec, nautilus  # Folders/files
bind = ALT, G, exec, google-chrome

##### Lock srcreen
bind = ALT, L, exec, hyprlock

#### Power
bind = ALT, P, exec, powyx

########## personal binaries ##########
bind = ALT, W, exec, ~/.local/bin/asryx   # asryx transcrption toggle

########## webapp shortcuts ($webapp = chrome --app=) ##########
bind = ALT SHIFT, C, exec, $webapp https://calendar.google.com
bind = ALT SHIFT, Y, exec, $webapp https://youtube.com
bind = ALT SHIFT, S, exec, $webapp https://soundcloud.com



########## launchers ##########
bind = ALT,  Return, exec, $term
bind = $mod, Space,  exec, $menu

########## windows ##########
bind = $mod, Q,   killactive
bind = ALT,  F4,  killactive
bind = $mod, F,   fullscreen,     1
bind = $mod, V,   togglefloating
bind = $mod, P,   pseudo
bind = $mod, S,   togglesplit

########## terminal (two ways) ##########
bind = ALT, K, exec, $term
bind = ALT, Q, exec, $term

########## focus ##########
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

########## move windows ##########
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d

########## workspace nav ##########
bind = CTRL ALT, left,  workspace, r-1
bind = CTRL ALT, right, workspace, r+1

bind = ALT,       TAB, cyclenext
bind = ALT SHIFT, TAB, cyclenext, prev

########## workspace teleport (numrow) ##########
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

########## workspace teleport (AZERTY/FR top row) ##########
bind = $mod, ampersand,  workspace, 1
bind = $mod, eacute,     workspace, 2
bind = $mod, quotedbl,   workspace, 3
bind = $mod, apostrophe, workspace, 4
bind = $mod, parenleft,  workspace, 5
bind = $mod, minus,      workspace, 6
bind = $mod, egrave,     workspace, 7
bind = $mod, underscore, workspace, 8
bind = $mod, ccedilla,   workspace, 9
bind = $mod, agrave,     workspace, 10

########## move window to workspace (physical keycodes, FR-safe) ##########
bind = $mod SHIFT, code:10, movetoworkspace, 1   # & / 1
bind = $mod SHIFT, code:11, movetoworkspace, 2   # é / 2
bind = $mod SHIFT, code:12, movetoworkspace, 3   # " / 3
bind = $mod SHIFT, code:13, movetoworkspace, 4   # ' / 4
bind = $mod SHIFT, code:14, movetoworkspace, 5   # ( / 5
bind = $mod SHIFT, code:15, movetoworkspace, 6   # - / 6
bind = $mod SHIFT, code:16, movetoworkspace, 7   # è / 7
bind = $mod SHIFT, code:17, movetoworkspace, 8   # _ / 8
bind = $mod SHIFT, code:18, movetoworkspace, 9   # ç / 9
bind = $mod SHIFT, code:19, movetoworkspace, 10  # à / 0

########## screenshots ##########
# Full screenshot → $screenshot_dir
bind = , Print, exec, grim $screenshot_dir/$(date +'%F_%H-%M-%S').png
# Region select → swappy for annotation
bind = $mod SHIFT, S, exec, grim -g "$(slurp)" - | swappy -f -

########## volume ##########
bind = , XF86AudioRaiseVolume, exec, pamixer -i 5
bind = , XF86AudioLowerVolume, exec, pamixer -d 5
bind = , XF86AudioMute,        exec, pamixer -t
bind = , XF86AudioMicMute,     exec, pamixer --default-source -t

########## brightness ##########
bind = , XF86MonBrightnessUp,   exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

########## mouse ##########
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
