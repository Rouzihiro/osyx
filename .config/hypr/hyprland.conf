# =============================================================================
# hyprland.conf — entry point
# Sources are split into public (no prefix) and private (underscore prefix).
#
# Public  → safe to share, makes Hyprland fully functional on any machine.
# Private → personal: binaries, workspace layout, app shortcuts, clipboard.
#
# Load order matters. Variables must come before anything that references them.
# =============================================================================

# ── Public ────────────────────────────────────────────────────────────────────
source = ~/.config/hypr/env.conf
source = ~/.config/hypr/variables.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/appearance.conf
source = ~/.config/hypr/rules.conf

# ── Private ───────────────────────────────────────────────────────────────────
source = ~/.config/hypr/_variables.conf
source = ~/.config/hypr/_startup.conf
source = ~/.config/hypr/_keybinds.conf
source = ~/.config/hypr/_clipboard.conf

