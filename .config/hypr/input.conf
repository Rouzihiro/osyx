# =============================================================================
# input.conf — keyboard, mouse, touchpad
# kb_layout is set to `fr` here. Change to your layout (e.g. `us`, `de`).
# =============================================================================

input {
  kb_layout    = fr
  repeat_rate  = 40
  repeat_delay = 250
  follow_mouse = 1
  sensitivity  = 0

  touchpad {
    natural_scroll = true
    tap-to-click   = true
  }
}
