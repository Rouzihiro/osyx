name: duplicate-configs

on:
    workflow_dispatch:
    workflow_call:

permissions:
    contents: read

jobs:
    check:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Detect duplicates
              shell: bash
              run: |
                  set -euo pipefail

                  echo "Checking case-insensitive path collisions..."
                  dup_paths="$(git ls-files | awk '{print tolower($0)}' | sort | uniq -d || true)"
                  if [[ -n "${dup_paths}" ]]; then
                    echo "Case-insensitive collisions found (will break on macOS/Windows):"
                    echo "${dup_paths}"
                    exit 1
                  fi

                  echo "Checking duplicate file content (config-like files)..."
                  python3 .github/workflows/scripts/duplicate-configs.py
