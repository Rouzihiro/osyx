name: changes

on:
  workflow_call:
    outputs:
      non_docs:
        description: "true if any non documentation files changed"
        value: ${{ jobs.detect.outputs.non_docs }}

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      non_docs: ${{ steps.filter.outputs.non_docs }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect non-docs changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            non_docs:
              - '**'
              - '!**/*.md'
              - '!**/*.mdx'
