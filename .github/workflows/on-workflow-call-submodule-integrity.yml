name: submodule-integrity

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      GH_PAT:
        required: true

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: detect
        uses: actions/github-script@v7
        with:
          script: |
            const fn = require('./.github/workflows/scripts/submodule-integrity.js')
            await fn({ github, context, core })

  integrity:
    needs: detect
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (top-level submodules only)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
          token: ${{ secrets.GH_PAT }}

      - name: Verify submodule integrity
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -f .gitmodules ]]; then
            echo "No .gitmodules found; skipping."
            exit 0
          fi

          git submodule sync
          git submodule update --init --depth 1

          echo "Submodule status:"
          git submodule status

          bad="$(git submodule status | awk '$1 ~ /^[-+]/ {print}')"
          if [[ -n "${bad}" ]]; then
            echo "Submodule mismatch / not initialized / unexpected revision:"
            echo "${bad}"
            exit 1
          fi

          git submodule foreach '
            set -e
            git rev-parse --verify HEAD >/dev/null
            git diff --quiet
          '
