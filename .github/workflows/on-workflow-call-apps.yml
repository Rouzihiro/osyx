name: Apps

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.apps }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            apps:
              - 'provisioning/apps/**'

  apps:
    needs: detect
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-latest
    name: test apps (debian-trixie)

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build local test container
        run: |
          docker build -t osyx-test-trixie .github/images/trixie

      - name: Run App Installers
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/tmp/workspace:ro \
            osyx-test-trixie bash -c "
              set -euo pipefail

              sudo rsync -a /tmp/workspace/ /home/smoke/osyx/
              sudo chown -R smoke:smoke /home/smoke/osyx
              cd /home/smoke/osyx

              sudo apt-get update -y
              sudo apt-get install -y curl wget gnupg ca-certificates git sudo

              for app in provisioning/apps/*; do
                if [[ -f \"\$app\" && \"\${app}\" != *README.md* ]]; then
                  echo \">>> Testing app installer: \$app\"
                  bash \"\$app\" || echo \"::warning::\$app failed to install cleanly\"
                fi
              done

              echo '>>> App installers completed.'
            "
